services:
  mysql-usuarios:
    image: mysql:8
    container_name: mysql-usuarios
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: usuarios_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_usuarios_data:/var/lib/mysql

  mysql-entrenamientos:
    image: mysql:8
    container_name: mysql-entrenamientos
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: entrenamientos_db
    ports:
      - "3308:3306"
    volumes:
      - mysql_entrenamientos_data:/var/lib/mysql

volumes:
  mysql_usuarios_data:
  mysql_entrenamientos_data: